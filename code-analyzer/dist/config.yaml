analyzer:
  # 目标编程语言: python | javascript | typescript | auto (自动检测)
  language: auto

  # 要分析的目录（相对于项目根目录）
  target_dir: "."

  # 排除的目录
  exclude_dirs:
    - "__pycache__"
    - "node_modules"
    - ".git"
    - ".venv"
    - "venv"
    - ".idea"
    - ".vscode"
    - "dist"
    - "build"
    - "output"

  # 排除的文件模式
  exclude_patterns:
    - "*.pyc"
    - "*.min.js"
    - "*.bundle.js"

llm:
  # 是否启用 LLM 分析
  enabled: true

  # API 地址（兼容 OpenAI 接口）
  api_base: "https://api.openai.com/v1"

  # API Key（也可通过环境变量 OPENAI_API_KEY 设置）
  api_key: ""

  # 模型名称
  model: "gpt-4o-mini"

  # 请求超时（秒）
  timeout: 60

  # 最大并发请求数
  max_concurrency: 5

  # 每个文件发送给 LLM 的最大字符数
  max_file_chars: 8000

output:
  # 输出目录
  dir: "./output"

  # 输出格式: json | markdown | both
  format: both

  # 是否在 markdown 中包含 Mermaid 依赖图
  include_mermaid: true

  # 是否生成 HTML 可视化依赖图
  include_html: true

